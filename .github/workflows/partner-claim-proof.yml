name: Partner Claim SQL Proof

on:
  push:
    branches:
      - feat/partner-claim-foundation
    paths:
      - .github/workflows/partner-claim-proof.yml
      - supabase/migrations/20260716090000_partner_claim_foundation.sql
      - supabase/migrations/20260718194500_fix_partner_claim_profile_ambiguity.sql
      - supabase/tests/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/partner-claim-proof.yml
      - supabase/migrations/20260716090000_partner_claim_foundation.sql
      - supabase/migrations/20260718194500_fix_partner_claim_profile_ambiguity.sql
      - supabase/tests/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  partner-claim-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: Prepare isolated synthetic Supabase project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .ci/partner-claim
          mkdir -p .ci/partner-claim
          cd .ci/partner-claim
          supabase init
          mkdir -p supabase/migrations
          cp ../../supabase/tests/fixtures/partner_claim_minimal_baseline.sql \
            supabase/migrations/20260716080000_partner_claim_minimal_baseline.sql
          cp ../../supabase/migrations/20260716090000_partner_claim_foundation.sql \
            supabase/migrations/20260716090000_partner_claim_foundation.sql
          cp ../../supabase/migrations/20260718194500_fix_partner_claim_profile_ambiguity.sql \
            supabase/migrations/20260718194500_fix_partner_claim_profile_ambiguity.sql

      - name: Start isolated Supabase stack and apply migrations
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/partner-claim-proof
          cd .ci/partner-claim
          supabase start 2>&1 | tee ../../artifacts/partner-claim-proof/supabase-start.txt

      - name: Run core and extended rollback proofs
        shell: bash
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          set -euo pipefail
          mkdir -p artifacts/partner-claim-proof

          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -v partner_a_id=11111111-1111-4111-8111-111111111111 \
            -v partner_b_id=22222222-2222-4222-8222-222222222222 \
            -v user_a_id=aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa \
            -v user_b_id=bbbbbbbb-bbbb-4bbb-8bbb-bbbbbbbbbbbb \
            -v internal_admin_user_id=cccccccc-cccc-4ccc-8ccc-cccccccccccc \
            -f supabase/tests/partner_claim_foundation_proof.sql \
            2>&1 | tee artifacts/partner-claim-proof/core-proof.txt

          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/partner_claim_extended_proof.sql \
            2>&1 | tee artifacts/partner-claim-proof/extended-proof.txt

          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -X -A -F '|' -c "
            select 'claim_table_exists', (to_regclass('public.partner_claim_invites') is not null)::text
            union all
            select 'claim_rpc_exists', (to_regprocedure('public.claim_partner_profile(text)') is not null)::text
            union all
            select 'synthetic_partner_count', (select count(*)::text from public.partners where is_test_record = true);
          " > artifacts/partner-claim-proof/schema-evidence.txt

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partner-claim-proof-${{ github.sha }}
          path: artifacts/partner-claim-proof
          if-no-files-found: warn
          retention-days: 14

      - name: Stop and destroy isolated Supabase stack
        if: always()
        shell: bash
        run: |
          if [ -d .ci/partner-claim ]; then
            cd .ci/partner-claim
            supabase stop --no-backup || true
          fi
