<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/heha-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#e85d2b" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>HEHA·swipe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const requestedTab = new URLSearchParams(window.location.search).get("tab");
        const tabLabels = {
          swipe: "Discover",
          faves: "Saved",
          deals: "Community",
          profile: "Profile",
        };
        const requestedLabel = tabLabels[requestedTab];
        if (!requestedLabel) return;

        const openRequestedTab = () => {
          const target = Array.from(document.querySelectorAll(".bottom-nav button")).find(
            (button) => button.textContent.trim().includes(requestedLabel)
          );
          if (!target) return false;
          target.click();
          return true;
        };

        if (openRequestedTab()) return;
        const observer = new MutationObserver(() => {
          if (openRequestedTab()) observer.disconnect();
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
        window.setTimeout(() => observer.disconnect(), 120000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
